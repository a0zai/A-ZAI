<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadsbestuur Doetinchem | Officiële Portaal</title>
    <meta name="description" content="Welkom bij het portaal van het Stadsbestuur Doetinchem. Informatie over gemeentelijke diensten, bestuur en actuele zaken in de gemeente Doetinchem.">
    <meta name="keywords" content="Stadsbestuur, Stadbestuur, Doetinchem, Gemeente Doetinchem, Bestuur, Overheid, Portaal">
    <meta name="author" content="Stadsbestuur Doetinchem">
    <meta property="og:title" content="Stadsbestuur Doetinchem">
    <meta property="og:description" content="Officiële toegang tot de diensten van de Gemeente Doetinchem.">
    <meta property="og:type" content="website">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #0d1117;
            color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .content {
            position: relative; z-index: 2; text-align: center;
            background: rgba(22, 27, 34, 0.9); padding: 50px;
            border-radius: 15px; border: 1px solid #30363d;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            max-width: 500px; width: 90%;
            animation: slideUp 1s ease-out;
        }

        .logo { width: 160px; margin-bottom: 30px; }

        h1 { font-size: 1.8rem; margin-bottom: 10px; font-weight: 600; color: #58a6ff; }
        p { font-size: 1.1rem; color: #8b949e; margin-bottom: 25px; }

        .loader-bar {
            width: 150px; height: 3px; background: #30363d;
            margin: 0 auto; border-radius: 5px; overflow: hidden;
        }
        .loader-fill {
            width: 0%; height: 100%; background: #238636;
            animation: load 3.5s linear forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes load { to { width: 100%; } }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="content">
        <img src="https://cuatro.sim-cdn.nl/doetinchem/uploads/2023-11/gemeente-doetinchem.svg" alt="Gemeente Doetinchem" class="logo">
        <h1>Stadsbestuur Doetinchem</h1>
        <p>U wordt doorverwezen naar de officiële website van de gemeente...</p>
        <div class="loader-bar">
            <div class="loader-fill"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 99 },
                "color": { "value": ["#58a6ff", "#ffffff"] },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.3 },
                "size": { "value": 2, "random": true },
                "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true }
            }
        });

        document.title = "Stadsbestuur Doetinchem | Officiële Website";
        const targetURL = "https://www.doetinchem.nl";
        setTimeout(() => {
            window.location.href = targetURL;
        }, 3301);
    </script>
</body>
</html>
