<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadbestuur Doetinchem</title>
    <meta name="description" content="Officiële erkenningspagina voor de uitstekende inzet van Dennis Kramer voor het Stadsbestuur van Doetinchem.">
    <meta name="keywords" content="Stadbestuur, Doetinchem, Gemeente Doetinchem, Dennis Kramer, Bestuurder, Top Bestuur, Overheid, Erkenning, Waardering">
    <meta name="author" content="Stadbestuur Waardering Portal">
    <meta name="robots" content="noindex, follow"> <meta property="og:title" content="Erkenning van Inzet | Dennis Kramer">
    <meta property="og:description" content="Officiële dankbetuiging voor zijn werkzaamheden binnen het Stadbestuur van Doetinchem.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stadbestuur.nl">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #080a0c; 
            color: #e6edf3;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace; /* Mono font */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1; 
        }

        .main-content {
            position: relative;
            z-index: 2; /* Voor de deeltjes */
            text-align: center;
            background: rgba(13, 17, 23, 0.85); /* Semi-transparante kaart */
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 90%;
            animation: cardFadeIn 1s ease-out;
        }

        .gov-logo {
            width: 120px;
            margin-bottom: 25px;
            opacity: 0.9;
        }
        .profile-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #58a6ff; 
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.5);
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .name-highlight {
            color: #58a6ff;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #8b949e;
            margin-bottom: 10px;
            font-weight: normal;
        }

        .role-tag {
            display: inline-block;
            background-color: rgba(35, 134, 54, 0.15);
            color: #3fb950;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid rgba(63, 185, 80, 0.3);
            margin-bottom: 25px;
        }

        .redirect-text {
            font-size: 0.9rem;
            color: #8b949e;
            margin-top: 20px;
        }

        .loader-container {
            width: 100px;
            height: 2px;
            background-color: #30363d;
            margin: 20px auto 0 auto;
            border-radius: 1px;
            overflow: hidden;
        }

        .loader-fill {
            width: 0%;
            height: 100%;
            background-color: #58a6ff;
            animation: loadProgress 4s linear forwards;
        }

        /* Animaties */
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes loadProgress {
            from { width: 0%; }
            to { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div class="main-content">
        <img src="https://cuatro.sim-cdn.nl/doetinchem/uploads/2023-11/gemeente-doetinchem.svg" alt="Gemeente Doetinchem" class="gov-logo">
        <img src="https://media.licdn.com/dms/image/C4E03AQG4nI9nNf9fLg/profile-displayphoto-shrink_400_400/0/1516268832561?e=1715817600&v=beta&t=48VvN-p9L3rK5A7I4G4gJ_S4T1S_E8S4D0K6I2Q8A3s" alt="Dennis Kramer" class="profile-photo">
        <h1>Bedankt, <span class="name-highlight">Dennis</span></h1>
        <p class="subtitle">Voor uw uitzonderlijke inzet voor het</p>
        <div class="role-tag">Stadbestuur Doetinchem</div>
        <p class="redirect-text">Doorverwijzen naar LinkedIn...</p>
        <div class="loader-container">
            <div class="loader-fill"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    
    <script>
        particlesJS('particles-js', {
            "particles": {
                "number": {
                    "value": 100, 
                    "density": { "enable": true, "value_area": 800 }
                },
                "color": {
                    "value": ["#ff9100", "#ff4500", "#ffffff"] // Vuur/Goud/Wit mix
                },
                "shape": {
                    "type": "circle",
                },
                "opacity": {
                    "value": 0.5,
                    "random": true,
                    "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false }
                },
                "size": {
                    "value": 3,
                    "random": true,
                    "anim": { "enable": false, "speed": 40, "size_min": 0.1, "sync": false }
                },
                "line_linked": {
                    "enable": false, 
                },
                "move": {
                    "enable": true,
                    "speed": 3, 
                    "direction": "up", 
                    "random": true,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false,
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": false },
                    "onclick": { "enable": false },
                    "resize": true
                }
            },
            "retina_detect": true
        });
    </script>
    <script>
        const linkedInURL = "https://www.linkedin.com/in/dennis-kramer-a6396014?utm_source=share_via&utm_content=profile&utm_medium=member_ios";

        setTimeout(() => {
            window.location.href = linkedInURL;
        }, 4500);
    </script>

</body>
</html>
